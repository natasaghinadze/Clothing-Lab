<div class="auth-container">
  <div class="left">
    <div class="login-box">
      <h1>პაროლის აღდგენა</h1>

      <p class="subtitle">
        შეიყვანე შენი ელფოსტა და გამოგიგზავნით პაროლის აღდგენის ბმულს.
      </p>

      <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" autocomplete="off">
        <div class="form-group">
          <label for="email">ელფოსტა</label>
          <input
            id="email"
            type="email"
            placeholder="example@email.com"
            formControlName="email"
          />
        </div>

        <button class="sign-in-btn" type="submit">
          გაგზავნა
        </button>

        <p class="signup-text">
          გახსენდა პაროლი?
          <a [routerLink]="['/login']">დაბრუნდი შესვლაზე</a>
        </p>

        <p *ngIf="message" class="message">{{ message }}</p>
      </form>
    </div>
  </div>

  <div class="rightImg"></div>
</div>
